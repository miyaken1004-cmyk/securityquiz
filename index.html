<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情報セキュリティ○✕クイズ Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-indigo-950 min-h-screen font-sans flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-xl">
        
        <div id="auth-screen" class="glass rounded-3xl shadow-2xl p-8 fade-in text-center">
            <div class="mb-6">
                <div class="inline-block p-4 rounded-2xl bg-indigo-100 text-indigo-600 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="C15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">APIキーの設定</h1>
                <p class="text-slate-500 text-sm mt-2">このアプリを動かすにはGoogle AI Studioの<br>APIキー（無料）が必要です。</p>
            </div>
            
            <input type="password" id="api-key-input" class="w-full p-4 border-2 border-slate-100 rounded-xl mb-4 focus:border-indigo-500 outline-none transition-all" placeholder="AI Studioのキーを入力 (AIza...)">
            
            <button onclick="saveApiKey()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95">
                設定を保存して開始
            </button>
            <p class="mt-4 text-xs text-slate-400 text-left">※入力したキーはあなたのブラウザ内にのみ保存され、作者や第三者に送信されることはありません。</p>
        </div>

        <div id="start-screen" class="hidden glass rounded-3xl shadow-2xl p-10 fade-in text-center">
            <h2 class="text-3xl font-black text-slate-800 mb-4">情報セキュリティ<br>○✕チャレンジ</h2>
            <p class="text-slate-600 mb-8 leading-relaxed">PDF資料に基づいた10問のクイズを<br>AIが毎回ランダムに作成します。</p>
            <button id="generate-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 px-8 rounded-2xl transition-all shadow-xl flex items-center justify-center active:scale-95">
                <span id="btn-text">🚀 クイズを生成して開始</span>
                <div id="loader" class="hidden ml-3 w-6 h-6 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
            <button onclick="clearApiKey()" class="mt-6 text-xs text-slate-400 underline decoration-dotted">APIキーを再設定する</button>
        </div>

        <div id="quiz-screen" class="hidden glass rounded-3xl shadow-2xl p-8 fade-in text-center">
            <div class="flex justify-between items-center mb-8">
                <span class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-lg text-xs font-bold uppercase tracking-widest">Question <span id="current-q-num">1</span> / 10</span>
                <span class="text-sm font-bold text-slate-400">Score: <span id="current-score">0</span></span>
            </div>
            
            <p id="question-text" class="text-xl font-bold text-slate-800 mb-10 leading-relaxed min-h-[100px] flex items-center justify-center"></p>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="handleAnswer('○')" class="bg-emerald-500 hover:bg-emerald-600 text-white font-black py-8 rounded-2xl text-5xl transition-all shadow-lg active:scale-95">○</button>
                <button onclick="handleAnswer('✕')" class="bg-rose-500 hover:bg-rose-600 text-white font-black py-8 rounded-2xl text-5xl transition-all shadow-lg active:scale-95">✕</button>
            </div>

            <div id="feedback" class="hidden mt-4 p-6 rounded-2xl bg-white border-2 border-slate-100 shadow-inner text-left">
                <h3 id="result-title" class="text-2xl font-bold mb-2"></h3>
                <p id="explanation-text" class="text-slate-600 text-sm mb-6 leading-relaxed"></p>
                <button id="next-btn" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-black transition-all">次の問題へ</button>
            </div>
        </div>

        <div id="result-screen" class="hidden glass rounded-3xl shadow-2xl p-12 fade-in text-center">
            <div class="text-7xl mb-6">🎯</div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">試験終了！</h2>
            <p class="text-6xl font-black text-indigo-600 my-8"><span id="final-score">0</span><span class="text-2xl text-slate-400 ml-2">/ 10</span></p>
            <button onclick="location.reload()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-lg">もう一度挑戦する</button>
        </div>

    </div>

    <script type="module">
        let apiKey = localStorage.getItem('GEMINI_API_KEY') || "";
        let quizzes = [];
        let currentIndex = 0;
        let score = 0;

        // ★ PDFの内容を元にしたコンテキスト（AIへの指示用）
        const hiddenSourceText = `
        情報セキュリティに関する資料：
        パスワードは10文字以上、英数字・記号混在が理想。名前や生年月日はNG。
        脆弱性（セキュリティホール）はOS更新で塞ぐ。修正前の攻撃はゼロデイ攻撃。
        IoT機器（家電等）も脆弱性リスクがある。踏み台にされるリスクもある。
        パスワードの使い回しは「なりすまし」の原因になる。
        `;

        window.onload = () => {
            if (apiKey) showScreen('start-screen');
        };

        window.saveApiKey = () => {
            const input = document.getElementById('api-key-input').value;
            if (input.length < 10) return alert("有効なAPIキーを入力してください。");
            apiKey = input;
            localStorage.setItem('GEMINI_API_KEY', apiKey);
            showScreen('start-screen');
        };

        window.clearApiKey = () => {
            localStorage.removeItem('GEMINI_API_KEY');
            location.reload();
        };

        function showScreen(id) {
            document.querySelectorAll('#app > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function fetchQuizzes() {
            // ここでAIに「毎回新しく」問題を作らせる命令を出しています
            const prompt = `以下のテキストに基づき、以前とは異なるユニークな○✕クイズを10問作成してJSON配列形式（keys: question, answer, explanation）で出力してください。：\n${hiddenSourceText}`;
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });

            if (!response.ok) throw new Error('API Key Error');
            const result = await response.json();
            return JSON.parse(result.candidates[0].content.parts[0].text);
        }

        document.getElementById('generate-btn').addEventListener('click', async () => {
            const btn = document.getElementById('generate-btn');
            const loader = document.getElementById('loader');
            const txt = document.getElementById('btn-text');

            btn.disabled = true;
            loader.classList.remove('hidden');
            txt.innerText = "AIが問題を生成中...";
            
            try {
                quizzes = await fetchQuizzes();
                showScreen('quiz-screen');
                showQuestion();
            } catch (e) {
                alert("エラーが発生しました。APIキーを確認してください。");
                btn.disabled = false;
                loader.classList.add('hidden');
                txt.innerText = "🚀 クイズを生成して開始";
            }
        });

        function showQuestion() {
            const q = quizzes[currentIndex];
            document.getElementById('current-q-num').innerText = currentIndex + 1;
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('current-score').innerText = score;
        }

        window.handleAnswer = (ans) => {
            if (!document.getElementById('feedback').classList.contains('hidden')) return;
            const q = quizzes[currentIndex];
            const feedback = document.getElementById('feedback');
            const resTitle = document.getElementById('result-title');
            feedback.classList.remove('hidden');
            
            if (ans === q.answer) {
                resTitle.innerText = "正解！ ✨";
                resTitle.className = "text-2xl font-bold mb-2 text-emerald-600";
                score++;
            } else {
                resTitle.innerText = "不正解... 😢";
                resTitle.className = "text-2xl font-bold mb-2 text-rose-600";
            }
            document.getElementById('explanation-text').innerText = q.explanation;
        };

        document.getElementById('next-btn').addEventListener('click', () => {
            currentIndex++;
            if (currentIndex < quizzes.length) {
                showQuestion();
            } else {
                showScreen('result-screen');
                document.getElementById('final-score').innerText = score;
            }
        });
    </script>
</body>
</html>
